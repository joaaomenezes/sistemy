<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmar e-mail - NexoERP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    :root {
      --bg: #07100d;
      --panel: #101815;
      --border: rgba(255,255,255,.1);
      --text: #e8edf5;
      --muted: #8ba19a;
      --accent: #00c896;
      --danger: #ff4757;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top, rgba(0,200,150,.16), transparent 32%), var(--bg);
      color: var(--text);
      font-family: Inter, sans-serif;
    }
    .card {
      width: min(440px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 34px 30px;
      text-align: center;
      box-shadow: 0 24px 70px rgba(0,0,0,.35);
    }
    .icon {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      margin: 0 auto 18px;
      background: rgba(0,200,150,.12);
      color: var(--accent);
      font-size: 26px;
    }
    h1 { margin: 0 0 10px; font-size: 24px; }
    p { margin: 0 0 22px; color: var(--muted); line-height: 1.55; font-size: 14px; }
    .btn {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 13px 16px;
      font-weight: 800;
      font-size: 14px;
      color: #021c14;
      background: var(--accent);
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn.secondary {
      margin-top: 10px;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .error .icon { background: rgba(255,71,87,.12); color: var(--danger); }
  </style>
</head>
<body>
  <main class="card" id="card">
    <div class="icon" id="icon"><i class="bi bi-hourglass-split"></i></div>
    <h1 id="title">Confirmando e-mail</h1>
    <p id="msg">Aguarde enquanto ativamos sua conta.</p>
    <a class="btn" id="primaryBtn" href="login.html" style="display:none">
      <i class="bi bi-box-arrow-in-right"></i> Ir para o login
    </a>
  </main>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
    async function confirmarEmail() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const card = document.getElementById('card');
      const icon = document.getElementById('icon');
      const title = document.getElementById('title');
      const msg = document.getElementById('msg');
      const btn = document.getElementById('primaryBtn');

      if (!token) {
        card.classList.add('error');
        icon.innerHTML = '<i class="bi bi-x-circle-fill"></i>';
        title.textContent = 'Link inválido';
        msg.textContent = 'O link de confirmação está incompleto. Solicite um novo e-mail de confirmação.';
        btn.style.display = 'inline-flex';
        return;
      }

      const result = await NexoAuth.verifyEmail(token);
      if (!result.ok) {
        card.classList.add('error');
        icon.innerHTML = '<i class="bi bi-x-circle-fill"></i>';
        title.textContent = 'Não foi possível confirmar';
        msg.textContent = result.message || 'Solicite um novo e-mail de confirmação e tente novamente.';
        btn.style.display = 'inline-flex';
        return;
      }

      icon.innerHTML = '<i class="bi bi-check-circle-fill"></i>';
      title.textContent = 'E-mail confirmado';
      msg.textContent = 'Sua conta foi ativada com sucesso. Você já pode acessar o painel.';
      btn.href = 'dashboard.html';
      btn.innerHTML = '<i class="bi bi-grid-1x2-fill"></i> Acessar o painel';
      btn.style.display = 'inline-flex';
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
    }

    confirmarEmail();
  </script>
</body>
</html>
